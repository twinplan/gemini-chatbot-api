<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spenseja AI | SMP Sejahtera 2</title>
  <!-- Font Outfit for a modern Gen Z look -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <div class="glass-container">
    <header class="chat-header">
      <div class="avatar">🏫</div>
      <div class="header-info">
        <h1>SMP Sejahtera 2 Cileungsi</h1>
        <p>AI Info Assistant ✨</p>
      </div>
    </header>

    <div id="chat-box" class="chat-box">
      <!-- Initial greeting message -->
      <div class="message bot">
        Halo! Selamat datang di layanan informasi resmi SMP Sejahtera 2 Cileungsi 🙌<br><br>Ada yang bisa aku bantu
        seputar pendaftaran, ekskul, atau fasilitas sekolah kita?
      </div>
    </div>

    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Tanya di sini, ya! 💬" autocomplete="off" required />
      <button type="submit" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22">
          <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor" />
        </svg>
      </button>
    </form>
  </div>
  <script src="script.js"></script>
</body>

</html>
